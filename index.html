<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR 空間雙機連線羅盤 V23.0 (幾何射線版)</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: #000 !important; font-family: 'Courier New', Courier, monospace; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    #init-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 18px 36px; background: #111827; border: 2px solid #4b5563; color: #9ca3af; font-size: 18px; font-weight: bold; letter-spacing: 3px; border-radius: 10px; cursor: not-allowed; z-index: 9999; box-shadow: 0 0 15px rgba(0,0,0,0.5); display: block; pointer-events: auto; transition: all 0.3s ease; text-align: center; line-height: 1.5; }
    #container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
    #magician-zone { position: absolute; bottom: 0; right: 0; width: 120px; height: 120px; z-index: 200; pointer-events: auto; }
    #crosshair { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: none; }
    .line-v { position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: rgba(52, 211, 153, 0.4); }
    .line-h { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(52, 211, 153, 0.4); }
    .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 1px solid rgba(52, 211, 153, 0.6); border-radius: 50%; }
    #radar-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 150vmax; height: 150vmax; border-radius: 50%; border: 2px solid rgba(52, 211, 153, 0.1); pointer-events: none; }
    #radar-sweep { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, rgba(52, 211, 153, 0) 0%, rgba(52, 211, 153, 0.05) 60%, rgba(52, 211, 153, 0.5) 100%); opacity: 0; transition: opacity 0.5s ease; }
    #circle-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90px; height: 90px; border-radius: 50%; background: rgba(2, 44, 34, 0.8); border: 2px solid #34d399; color: #34d399; font-weight: bold; letter-spacing: 2px; font-size: 14px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 10; pointer-events: auto; overflow: hidden; display: none; }
    #btn-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: rgba(52, 211, 153, 0.6); z-index: 1; }
    .btn-text { position: relative; z-index: 2; } 
    #status-text { position: absolute; top: 40px; width: 90%; left: 5%; text-align: center; color: #34d399; font-size: 14px; opacity: 0.9; letter-spacing: 2px; word-break: break-all; z-index: 1000; display: none; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 5px; transition: background 0.2s ease, color 0.2s ease; border: 1px solid rgba(52, 211, 153, 0.2); }
  </style>
</head>
<body>

  <button id="init-btn" disabled>環境安全檢測中...</button>
  <div id="container"></div>
  
  <div id="overlay">
    <div id="crosshair"><div class="line-v"></div><div class="line-h"></div><div class="center-circle"></div></div>
    <div id="status-text">SYSTEM STANDBY</div>
    <div id="radar-container"><div id="radar-sweep"></div></div>
    <button id="circle-btn"><div id="btn-fill"></div><span class="btn-text">SCAN</span></button>
  </div>
  <div id="magician-zone"></div>

  <script>
    const initBtn = document.getElementById('init-btn');
    const statusText = document.getElementById('status-text');
    const circleBtn = document.getElementById('circle-btn');

    function showFatalError(msg) {
      statusText.style.display = 'block';
      statusText.innerText = "【系統異常】： " + msg;
      statusText.style.background = "rgba(239, 68, 68, 0.7)";
      statusText.style.color = "#fff";
    }
    
    window.addEventListener('error', (e) => {
      if (e.message && (e.message.includes("Script error") || e.message === "Script error.")) return;
      showFatalError(e.message);
    });
    window.addEventListener('unhandledrejection', (e) => {
      const msg = e.reason ? e.reason.message : e.reason;
      if (msg && (msg.includes("Script error") || msg === "Script error.")) return;
      showFatalError(msg);
    });

    const threeCdnList = [
      "https://cdnjs.cloudflare.com/ajax/libs/three.js/r124/three.min.js",
      "https://cdn.jsdelivr.net/npm/three@0.124.0/build/three.min.js"
    ];
    const mindArCdnList = [
      "https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-three.prod.js",
      "https://unpkg.com/mind-ar@1.1.5/dist/mindar-image-three.prod.js"
    ];

    let threeIndex = 0, mindArIndex = 0;

    function loadThreeEngine() {
      if (threeIndex >= threeCdnList.length) { initBtn.innerHTML = "🚨 3D核心重載失敗"; return; }
      initBtn.innerHTML = `引導 3D 核心...`;
      let script = document.createElement('script'); script.src = threeCdnList[threeIndex]; script.crossOrigin = "anonymous";
      script.onload = () => { if (window.THREE) loadMindArEngine(); else { threeIndex++; loadThreeEngine(); } };
      script.onerror = () => { threeIndex++; loadThreeEngine(); };
      document.head.appendChild(script);
    }

    function loadMindArEngine() {
      if (mindArIndex >= mindArCdnList.length) { initBtn.innerHTML = "🚨 AR核心重載失敗"; return; }
      initBtn.innerHTML = `對齊 AR 空間...`;
      let script = document.createElement('script'); script.src = mindArCdnList[mindArIndex]; script.crossOrigin = "anonymous";
      script.onload = () => {
        if (window.MINDAR && window.MINDAR.IMAGE && window.MINDAR.IMAGE.MindARThree) {
          initBtn.innerHTML = "啟動魔法連線"; initBtn.style.background = "#022c22"; initBtn.style.border = "2px solid #34d399";
          initBtn.style.color = "#34d399"; initBtn.style.cursor = "pointer"; initBtn.style.boxShadow = "0 0 25px rgba(52, 211, 153, 0.6)";
          initBtn.disabled = false; initBtn.addEventListener('click', startAR);
        } else { mindArIndex++; loadMindArEngine(); }
      };
      script.onerror = () => { mindArIndex++; loadMindArEngine(); };
      document.head.appendChild(script);
    }
    
    window.addEventListener('DOMContentLoaded', loadThreeEngine);

    // Firebase 配置
    const firebaseConfig = { databaseURL: "https://magic-ar-radar-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("magic_space_node");
    const urlParams = new URLSearchParams(window.location.search);
    const myRole = urlParams.get('role') || 'audience'; 

    if (myRole === 'magician') {
      db.set({ status: "ready", x: 0, y: 0, z: 0 });
    }

    let mindartThree, THREE, renderer, scene, camera, anchorGroup, targetMarker, dotMat, ringMat;
    let isTargetTracked = false, appState = 0, isPressing = false, pressStartTime = 0;
    let isFlashing = false, flashStartTime = 0, lastFlashTriggerTime = 0, hasSweptOnce = false; 
    let isDataSynced = false; 

    function refreshAudienceUI() {
      if (myRole !== 'audience') return;
      if (isTargetTracked) {
        if (isDataSynced) {
          if (appState === 0) {
            statusText.innerText = "空間特徵吻合，SCAN 系統就緒";
            circleBtn.style.display = 'flex';
          }
        } else {
          statusText.innerText = "空間特徵吻合，等待魔術師鎖定空間座標... ";
          circleBtn.style.display = 'none';
        }
      } else {
        statusText.innerText = "請對準桌上的 Bicycle 牌盒...";
        circleBtn.style.display = 'none';
      }
    }

    async function startAR() {
      initBtn.disabled = true; initBtn.innerText = "授權相機中...";

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        initBtn.style.display = 'none'; document.body.style.backgroundColor = 'transparent';
        statusText.style.display = 'block'; document.getElementById('crosshair').style.display = 'block';
        statusText.innerText = "通道安全建立中...";
        
        await new Promise(resolve => setTimeout(resolve, 100));
        stream.getTracks().forEach(t => t.stop());

        mindartThree = new window.MINDAR.IMAGE.MindARThree({
          container: document.getElementById('container'),
          imageTargetSrc: 'targets.mind', maxTrack: 1
        });

        THREE = window.THREE;
        renderer = mindartThree.renderer; scene = mindartThree.scene; camera = mindartThree.camera;
        anchorGroup = mindartThree.addAnchor(0);
        targetMarker = new THREE.Group();

        dotMat = new THREE.MeshBasicMaterial({ color: 0x34d399, transparent: true, opacity: 0.5 }); 
        targetMarker.add(new THREE.Mesh(new THREE.SphereGeometry(0.006, 16, 16), dotMat));
        ringMat = new THREE.MeshBasicMaterial({ color: 0x34d399, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
        targetMarker.add(new THREE.Mesh(new THREE.RingGeometry(0.009, 0.013, 32), ringMat));

        targetMarker.position.set(0, 0, 0); targetMarker.visible = false; 
        anchorGroup.group.add(targetMarker);

        anchorGroup.onTargetFound = () => { 
          isTargetTracked = true; 
          if (myRole === 'magician') {
            statusText.innerText = "【準心鎖定模式】請將螢幕準心對準目標，點擊右下角確認"; 
          } else { refreshAudienceUI(); } 
        };
        
        anchorGroup.onTargetLost = () => { 
          isTargetTracked = false; 
          if (myRole === 'magician') {
            statusText.innerText = "請對準桌上的 Bicycle 牌盒..."; 
          } else { refreshAudienceUI(); } 
        };

        // 【🔥 魔術師發射端修復】：改為幾何射線交織投影，鎖定準心指向的平面座標
        document.getElementById('magician-zone').addEventListener('click', (e) => {
          e.preventDefault(); e.stopPropagation();
          if (myRole !== 'magician') return;
          
          if (isTargetTracked) {
            scene.updateMatrixWorld(true); // 迫使世界矩陣全面計算

            // 建立中心射線
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

            // 以牌盒當前的姿態，在空間中虛擬一條 Z=0 的無限延伸二維平面
            const planeNormal = new THREE.Vector3(0, 0, 1).applyQuaternion(anchorGroup.group.quaternion);
            const planePoint = new THREE.Vector3(0, 0, 0).applyMatrix4(anchorGroup.group.matrixWorld);
            const targetPlane = new THREE.Plane().setFromNormalAndCoplanarPoint(planeNormal, planePoint);

            const intersectPoint = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(targetPlane, intersectPoint)) {
              // 精準捕捉到射線穿透牌盒平面的相對局部座標
              const localPos = anchorGroup.group.worldToLocal(intersectPoint);
              
              db.set({ status: "locked", x: localPos.x, y: localPos.y, z: localPos.z }); 
              
              statusText.innerText = "🔒 【密】準心目標錨點已成功鎖定！";
              statusText.style.background = "rgba(52, 211, 153, 0.95)"; statusText.style.color = "#022c22"; statusText.style.fontWeight = "bold";
            } else {
              // 備用安全方案
              const fallbackWorld = new THREE.Vector3(0, 0, -0.15).applyMatrix4(camera.matrixWorld);
              const localPos = anchorGroup.group.worldToLocal(fallbackWorld);
              db.set({ status: "locked", x: localPos.x, y: localPos.y, z: localPos.z });
              statusText.innerText = "🔒 【密】相對錨點已強制設定！";
            }
            
            setTimeout(() => {
              statusText.style.background = "rgba(0,0,0,0.5)"; statusText.style.color = "#34d399"; statusText.style.fontWeight = "normal";
              if (isTargetTracked) statusText.innerText = "【準心鎖定模式】請將螢幕準心對準目標，點擊右下角確認";
            }, 2200);
            if(navigator.vibrate) navigator.vibrate([40, 40]);
          } else {
            statusText.innerText = "❌ 警告：必須先對準牌盒才能鎖定錨點！";
            statusText.style.background = "rgba(239, 68, 68, 0.95)"; statusText.style.color = "#fff";
            setTimeout(() => {
              statusText.style.background = "rgba(0,0,0,0.5)"; statusText.style.color = "#34d399";
              if (!isTargetTracked) statusText.innerText = "請對準桌上的 Bicycle 牌盒...";
            }, 2200);
          }
        });

        // 觀眾接收端
        if (myRole === 'audience') {
          db.on('value', (snapshot) => { 
            const data = snapshot.val(); 
            if (data && data.status === "locked" && typeof data.x === 'number') {
              targetMarker.position.set(data.x, data.y, data.z);
              isDataSynced = true;
            } else {
              isDataSynced = false;
              appState = 0;
              document.getElementById('radar-sweep').style.opacity = '0';
              hasSweptOnce = false;
            } 
            refreshAudienceUI();
          });
          
          let btnFill = document.getElementById('btn-fill');
          circleBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); isPressing = true; pressStartTime = 0; if(navigator.vibrate) navigator.vibrate(30); });
          const cancelPress = () => { if(isPressing) { isPressing = false; btnFill.style.height = '0%'; } };
          window.addEventListener('pointerup', cancelPress); circleBtn.addEventListener('pointerleave', cancelPress);
        }

        await mindartThree.start();
        statusText.innerText = "正在捕捉 Bicycle 牌盒特徵...";
        if (myRole === 'audience') refreshAudienceUI();
        
        let radarSweep = document.getElementById('radar-sweep');
        
        // 核心渲染迴圈
        renderer.setAnimationLoop((timestamp) => {
          try {
            if (isPressing && myRole === 'audience') {
              if (pressStartTime === 0) pressStartTime = timestamp;
              let progress = Math.min((timestamp - pressStartTime) / 1800, 1.0); 
              document.getElementById('btn-fill').style.height = (progress * 100) + '%';
              if (progress >= 1.0) {
                isPressing = false; appState = 2; circleBtn.style.display = 'none';
                statusText.innerText = "RADAR SCANNING SPATIAL ANOMALY...";
                radarSweep.style.opacity = '1'; targetMarker.visible = false; hasSweptOnce = false;
                if(navigator.vibrate) navigator.vibrate([80, 40, 80]);
              }
            }
            
            if (appState === 2 && isTargetTracked) {
              const radarAngle = ((timestamp % 2400) / 2400) * Math.PI * 2;
              radarSweep.style.transform = `rotate(${radarAngle}rad)`;
              
              // 【🔥 核心關鍵修復一】：強刷整個場景樹的矩陣，迫使父節點的動態位移完美滲透至子節點
              scene.updateMatrixWorld(true);
              
              // 【🔥 核心關鍵修復二】：改用絕對相機逆矩陣轉換，做高精度深度（Z軸）前方過濾
              const camInverse = new THREE.Matrix4().copy(camera.matrixWorld).invert();
              const targetWorldPos = new THREE.Vector3(); 
              targetMarker.getWorldPosition(targetWorldPos); 
              
              const localToCam = targetWorldPos.clone().applyMatrix4(camInverse);
              
              if (localToCam.z < 0) { // 負 Z 代表點在相機前方，安全進入可視錐體內
                const vector = targetWorldPos.clone().project(camera);
                
                let targetAngle = Math.atan2(vector.x, vector.y); 
                if (targetAngle < 0) targetAngle += Math.PI * 2;
                let angleDiff = Math.abs(radarAngle - targetAngle); 
                if (angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;
                
                if (angleDiff < 0.22 && !isFlashing && (timestamp - lastFlashTriggerTime > 1800)) {
                  isFlashing = true; hasSweptOnce = true; flashStartTime = timestamp; lastFlashTriggerTime = timestamp;
                  if(navigator.vibrate) navigator.vibrate([60, 120]);
                }
              }
              
              if (isFlashing) {
                targetMarker.visible = true; let phase = Math.floor((timestamp - flashStartTime) / 120);
                if (phase === 0 || phase === 2) { targetMarker.scale.set(2.2, 2.2, 2.2); dotMat.opacity = 1.0; ringMat.opacity = 1.0; } 
                else if (phase === 1 || phase === 3) { targetMarker.scale.set(1.0, 1.0, 1.0); dotMat.opacity = 0.5; ringMat.opacity = 0.3; } 
                else isFlashing = false; 
              } else if (hasSweptOnce) { 
                targetMarker.visible = true; targetMarker.scale.set(1.0, 1.0, 1.0); dotMat.opacity = 0.5; ringMat.opacity = 0.3; 
              } else {
                targetMarker.visible = false;
              }
            }
            renderer.render(scene, camera);
          } catch (renderError) {
            console.warn("內部渲染已防禦: ", renderError.message);
          }
        });
      } catch (err) { showFatalError("AR啟動中斷: " + err.message); }
    }
  </script>
</body>
</html>
