<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR 空間雙機連線羅盤 V37.5 (物理空間絕對重合版)</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; user-select: none; -webkit-user-select: none; }
    #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; pointer-events: none; }
    
    #status-text { position: absolute; top: 40px; width: 90%; left: 5%; text-align: center; color: #34d399; font-size: 15px; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 8px; border: 1px solid rgba(52, 211, 153, 0.4); font-weight: bold; letter-spacing: 1px; pointer-events: auto; z-index: 10005; transition: color 0.3s; }
    
    #crosshair-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1001; display: none; }
    .crosshair-line-v { position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: rgba(52, 211, 153, 0.6); transform: translateX(-0.5px); }
    .crosshair-line-h { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(52, 211, 153, 0.6); transform: translateY(-0.5px); }

    #radar-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 150vmax; height: 150vmax; border-radius: 50%; border: 2px solid rgba(52, 211, 153, 0.08); display: none; }
    #radar-sweep { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, rgba(52, 211, 153, 0) 0%, rgba(52, 211, 153, 0.03) 60%, rgba(52, 211, 153, 0.5) 100%); opacity: 0; transition: opacity 0.3s ease; animation: spin 1.5s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    #circle-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95px; height: 95px; border-radius: 50%; background: rgba(2, 44, 34, 0.9); border: 2px solid #34d399; color: #34d399; font-weight: bold; font-size: 14px; display: none; justify-content: center; align-items: center; cursor: pointer; pointer-events: auto; box-shadow: 0 0 20px rgba(52, 211, 153, 0.4); transition: transform 0.1s; letter-spacing: 1px; z-index: 10006; }
    #circle-btn:active { transform: translate(-50%, -50%) scale(0.9); }

    #magician-zone { position: absolute; bottom: 0; right: 0; width: 140px; height: 140px; pointer-events: auto; background: transparent; z-index: 9999; display: none; }

    #qr-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0a0a0a; z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #34d399; font-family: sans-serif; pointer-events: auto; padding-top: 60px; box-sizing: border-box; }
    #qr-overlay h2 { margin-bottom: 5px; color: #fff; font-size: 20px; }
    #qr-overlay p { margin-bottom: 25px; font-size: 14px; color: #a7f3d0; }
    #qr-image { border: 8px solid #10b981; border-radius: 12px; background: white; padding: 10px; }
    #qr-footer { margin-top: 30px; font-size: 13px; color: #6ee7b7; opacity: 0.8; text-align: center; padding: 0 20px; font-weight: bold; animation: pulse 2s infinite; }
  </style>
</head>
<body>

  <div id="qr-overlay">
    <h2>🧙‍♂️ 魔術師演出主控台</h2>
    <p>請讓觀眾的手機掃描下方條碼：</p>
    <img id="qr-image" src="" alt="Audience QR Code">
    <div id="qr-footer">💡 觀眾掃描完成後，【點擊螢幕任意處】正式開始表演</div>
  </div>

  <div id="ui-layer">
    <div id="status-text">Searching....</div>
    
    <div id="crosshair-container">
      <div class="crosshair-line-v"></div>
      <div class="crosshair-line-h"></div>
    </div>

    <div id="radar-container"><div id="radar-sweep"></div></div>
    <div id="circle-btn">SCAN</div>
    
    <div id="magician-zone"></div>
  </div>

  <a-scene mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.1; filterBeta: 10" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    
    <a-entity mindar-image-target="targetIndex: 0" id="target-anchor">
      <a-plane id="hit-plane" position="0 0 0" scale="15 15 1" material="transparent: true; opacity: 0;"></a-plane>
      
      <a-entity id="target-marker" visible="false">
        <a-sphere position="0 0 1.0" radius="0.08" material="color: #00ff00;"></a-sphere>
        <a-cylinder position="0 0 0.5" radius="0.016" height="1.0" rotation="90 0 0" material="color: #00ff00; opacity: 0.7; transparent: true"></a-cylinder>
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    const firebaseConfig = { databaseURL: "https://magic-ar-radar-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("magic_space_node");
    
    const urlParams = new URLSearchParams(window.location.search);
    const myRole = urlParams.get('role') || 'audience'; 
    
    const statusText = document.getElementById('status-text');
    const crosshairContainer = document.getElementById('crosshair-container'); 
    const radarContainer = document.getElementById('radar-container');
    const radarSweep = document.getElementById('radar-sweep');
    const scanBtn = document.getElementById('circle-btn');
    const magicianZone = document.getElementById('magician-zone');
    const qrOverlay = document.getElementById('qr-overlay');
    
    const targetAnchor = document.getElementById('target-anchor');
    const targetMarker = document.getElementById('target-marker');
    const hitPlane = document.getElementById('hit-plane');
    const sceneEl = document.querySelector('a-scene');
    
    let isTargetTracked = false;
    let magicData = null; 
    let scanTimer = null; 
    let isRadarActive = false; 
    let blinkInterval = null;  

    if (myRole === 'magician') {
      magicianZone.style.display = 'block'; 
      
      const audienceUrl = window.location.origin + window.location.pathname;
      document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(audienceUrl)}`;
      qrOverlay.style.display = 'flex';
      crosshairContainer.style.display = 'none';

      function triggerStart() {
        qrOverlay.style.display = 'none';
        crosshairContainer.style.display = 'block'; 
        db.set({ status: "ready" }); 
        if(navigator.vibrate) navigator.vibrate(60); 
      }
      qrOverlay.addEventListener('click', triggerStart);
    } else {
      crosshairContainer.style.display = 'block';
    }

    db.on('value', (snapshot) => {
      magicData = snapshot.val();
      applyPhysicalCoordinates(); // 收到雲端資料時，直接套用絕對物理座標
      updateUIState(); 
    });

    targetAnchor.addEventListener("targetFound", event => {
      isTargetTracked = true;
      applyPhysicalCoordinates();
      updateUIState();
    });
    
    targetAnchor.addEventListener("targetLost", event => {
      isTargetTracked = false;
      updateUIState(); 
      cancelScan();
      if (blinkInterval) { clearInterval(blinkInterval); blinkInterval = null; }
      targetMarker.setAttribute('visible', 'false');
    });

    function updateUIState() {
      if (!isTargetTracked) {
        statusText.innerText = "Searching....";
        statusText.style.color = "#34d399";
        scanBtn.style.display = 'none';
        return;
      }

      if (isRadarActive) {
        statusText.innerText = "Press SCAN to find your card"; 
        statusText.style.color = "#34d399";
        targetMarker.setAttribute('visible', 'true');
        if (!blinkInterval) startRadarBlinkingEffect();
        return;
      }

      if (statusText.innerText !== "Signal weak, please SCAN again...") {
        statusText.innerText = "Press SCAN to find your card";
        statusText.style.color = "#34d399";
      }
      scanBtn.style.display = 'flex'; 
    }

    // 🚀 核心修正：直接將雲端「粘在桌面上的實體座標」設定給圖釘。
    // 因為 targetMarker 本身就是 targetAnchor (鬼牌) 的子元素，
    // 所以設定它的 position 就能自動完美對應鬼牌的上下左右，無視任何相機角度！
    function applyPhysicalCoordinates() {
      if (!magicData || magicData.status !== "locked") return;
      
      // 原封不動套用相對於鬼牌中心的實體公尺距離
      targetMarker.setAttribute('position', `${magicData.physX} ${magicData.physY} 0`);
    }

    // --- 4. 🤫 魔術師：精確鎖定「相對於鬼牌桌面宇宙」的實體座標 ---
    magicianZone.addEventListener('click', (e) => {
      if (!isTargetTracked) return;

      const THREE = AFRAME.THREE;
      const raycaster = new THREE.Raycaster();
      // 從魔術師的螢幕正中央 (0,0) 發射 3D 物理射線
      raycaster.setFromCamera(new THREE.Vector2(0, 0), sceneEl.camera); 
      
      const hitMesh = hitPlane.getObject3D('mesh');
      const intersects = raycaster.intersectObject(hitMesh, true);
      
      if (intersects.length > 0) {
        const point = intersects[0].point;
        // 關鍵：將「世界座標」轉換為「相對於鬼牌實體的局部物理座標」
        const localPos = targetAnchor.object3D.worldToLocal(point.clone());
        
        // 🔒 傳送純粹的、粘在桌面上的物理相對距離 (單位：公尺)
        db.set({ 
          status: "locked", 
          physX: localPos.x, 
          physY: localPos.y
        });
        
        if (navigator.vibrate) navigator.vibrate(60); 
      }
    });

    // --- 5. 長按 SCAN 蓄力邏輯 ---
    function startScan(e) {
      if (e.cancelable) e.preventDefault();
      if (!isTargetTracked) return;

      radarContainer.style.display = 'block';
      radarSweep.style.opacity = '1';
      statusText.innerText = "Analyzing space dimension...";
      statusText.style.color = "#facc15";

      scanTimer = setTimeout(() => {
        executeScanSuccess();
      }, 2000); 
    }

    function cancelScan() {
      if (scanTimer && !isRadarActive) {
        clearTimeout(scanTimer);
        scanTimer = null;
        radarSweep.style.opacity = '0';
        radarContainer.style.display = 'none';
        if (isTargetTracked) {
          statusText.innerText = "Press SCAN to find your card";
          statusText.style.color = "#34d399";
        }
      }
    }

    function executeScanSuccess() {
      scanTimer = null;

      if (magicData && magicData.status === "locked") {
        isRadarActive = true; 
        scanBtn.style.display = 'none'; 

        applyPhysicalCoordinates(); // 確保圖釘死死咬住物理座標
        targetMarker.setAttribute('visible', 'true');
        
        startRadarBlinkingEffect();
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
      } else {
        radarSweep.style.opacity = '0';
        radarContainer.style.display = 'none';
        statusText.innerText = "Signal weak, please SCAN again...";
        statusText.style.color = "#ef4444"; 
      }
    }

    function startRadarBlinkingEffect() {
      if (blinkInterval) clearInterval(blinkInterval);
      
      blinkInterval = setInterval(() => {
        if (!isTargetTracked) return;
        
        setTimeout(() => targetMarker.setAttribute('visible', 'false'), 0);
        setTimeout(() => targetMarker.setAttribute('visible', 'true'), 120);
        setTimeout(() => targetMarker.setAttribute('visible', 'false'), 240);
        setTimeout(() => targetMarker.setAttribute('visible', 'true'), 360);
      }, 1500);
    }

    scanBtn.addEventListener('touchstart', startScan, { passive: false });
    scanBtn.addEventListener('touchend', cancelScan);
    scanBtn.addEventListener('touchcancel', cancelScan);
    scanBtn.addEventListener('mousedown', startScan);
    scanBtn.addEventListener('mouseup', cancelScan);
    scanBtn.addEventListener('mouseleave', cancelScan);
  </script>
</body>
</html>
