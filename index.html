<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR 空間連線羅盤 V33.0 (A-Frame 引擎切換版)</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; pointer-events: none; }
    #crosshair { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .line-v { position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: rgba(52, 211, 153, 0.8); }
    .line-h { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(52, 211, 153, 0.8); }
    .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 1px solid rgba(52, 211, 153, 0.9); border-radius: 50%; }
    #status-text { position: absolute; top: 40px; width: 90%; left: 5%; text-align: center; color: #34d399; font-size: 14px; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; border: 1px solid rgba(52, 211, 153, 0.5); font-weight: bold; pointer-events: auto;}
    #magician-zone { position: absolute; bottom: 0; right: 0; width: 120px; height: 120px; pointer-events: auto; }
  </style>
</head>
<body>
  <div id="ui-layer">
    <div id="status-text">相機載入中，請同意權限...</div>
    <div id="crosshair"><div class="line-v"></div><div class="line-h"></div><div class="center-circle"></div></div>
    <div id="magician-zone"></div>
  </div>

  <a-scene mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.1; filterBeta: 10" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    
    <a-entity mindar-image-target="targetIndex: 0" id="target-anchor">
      <a-box position="0 0 0" scale="1 1.4 0.1" material="color: #3b82f6; wireframe: true; wireframeLinewidth: 3"></a-box>
      
      <a-plane id="hit-plane" position="0 0 0" scale="15 15 1" material="transparent: true; opacity: 0;"></a-plane>
      
      <a-entity id="target-marker" visible="false">
        <a-sphere position="0 0 0.5" radius="0.05" material="color: #00ff00;"></a-sphere>
        <a-cylinder position="0 0 0.25" radius="0.01" height="0.5" rotation="90 0 0" material="color: #00ff00; opacity: 0.6; transparent: true"></a-cylinder>
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    const firebaseConfig = { databaseURL: "https://magic-ar-radar-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("magic_space_node");
    const urlParams = new URLSearchParams(window.location.search);
    const myRole = urlParams.get('role') || 'audience'; 
    
    const statusText = document.getElementById('status-text');
    const targetAnchor = document.getElementById('target-anchor');
    const targetMarker = document.getElementById('target-marker');
    const hitPlane = document.getElementById('hit-plane');
    const sceneEl = document.querySelector('a-scene');
    
    let isTargetTracked = false;

    if (myRole === 'magician') {
      db.set({ status: "ready", x: 0, y: 0, z: 0 });
    }

    // 監聽 AR 追蹤狀態
    targetAnchor.addEventListener("targetFound", event => {
      isTargetTracked = true;
      if (myRole === 'magician') {
        statusText.innerText = "【追蹤成功】點擊右下角發射！";
        statusText.style.color = "#00ff00";
      } else {
        statusText.innerText = "空間特徵吻合，等待發射...";
      }
    });
    
    targetAnchor.addEventListener("targetLost", event => {
      isTargetTracked = false;
      statusText.innerText = "請照到牌盒...";
      statusText.style.color = "#34d399";
    });

    // 魔術師發射邏輯
    document.getElementById('magician-zone').addEventListener('click', (e) => {
      if (myRole !== 'magician' || !isTargetTracked) return;
      
      // 呼叫 A-Frame 內建的 Three.js 射線
      const THREE = AFRAME.THREE;
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(new THREE.Vector2(0, 0), sceneEl.camera);
      
      const hitMesh = hitPlane.getObject3D('mesh');
      const intersects = raycaster.intersectObject(hitMesh, true);
      
      if (intersects.length > 0) {
        const point = intersects[0].point;
        const localPos = targetAnchor.object3D.worldToLocal(point.clone());
        localPos.z = 0; // 貼齊牌盒平面
        
        targetMarker.setAttribute('position', `${localPos.x} ${localPos.y} ${localPos.z}`);
        targetMarker.setAttribute('visible', 'true');
        
        statusText.innerText = `✅ 命中座標 (${localPos.x.toFixed(2)}, ${localPos.y.toFixed(2)})`;
        db.set({ status: "locked", x: localPos.x, y: localPos.y, z: localPos.z });
        if(navigator.vibrate) navigator.vibrate([40, 40]);
      }
    });

    // 觀眾接收邏輯
    if (myRole === 'audience') {
      db.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && data.status === "locked" && isTargetTracked) {
          targetMarker.setAttribute('position', `${data.x} ${data.y} ${data.z}`);
          targetMarker.setAttribute('visible', 'true');
          statusText.innerText = "🔴 已接收到魔術師的圖釘！";
          statusText.style.color = "#ff0000";
        }
      });
    }
  </script>
</body>
</html>
