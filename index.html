<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR 空間雙機連線羅盤 V32.0 (強制鎖死畫布版)</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    /* 🔥 暴力解法進化：不只調圖層，徹底鎖死位置，不准 JS 把畫布移到螢幕外 */
    #container canvas, #container video {
      position: absolute !important;
      top: 0px !important;
      left: 0px !important;
      width: 100vw !important;
      height: 100vh !important;
      margin: 0px !important;
      padding: 0px !important;
      transform: none !important;
    }
    #container canvas { z-index: 9999 !important; pointer-events: none !important; }
    #container video { z-index: 1 !important; object-fit: cover !important; }

    body { margin: 0; overflow: hidden; background-color: #000 !important; font-family: 'Courier New', Courier, monospace; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    #init-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 18px 36px; background: #111827; border: 2px solid #4b5563; color: #9ca3af; font-size: 18px; font-weight: bold; letter-spacing: 3px; border-radius: 10px; cursor: pointer; z-index: 10000; display: block; pointer-events: auto; }
    #container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 10; overflow: hidden; }
    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
    #magician-zone { position: absolute; bottom: 0; right: 0; width: 120px; height: 120px; z-index: 10000; pointer-events: auto; }
    #crosshair { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: none; }
    .line-v { position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: rgba(52, 211, 153, 0.8); }
    .line-h { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(52, 211, 153, 0.8); }
    .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 1px solid rgba(52, 211, 153, 0.9); border-radius: 50%; }
    
    #status-text { position: absolute; top: 40px; width: 90%; left: 5%; text-align: center; color: #34d399; font-size: 14px; opacity: 0.95; z-index: 10000; display: none; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; border: 1px solid rgba(52, 211, 153, 0.5); font-weight: bold; }
    
    /* 🛠️ 新增：畫布座標偵測面板 */
    #debug-panel { position: absolute; top: 100px; left: 5px; background: rgba(0,0,0,0.7); color: yellow; font-size: 10px; padding: 5px; z-index: 10000; border: 1px solid yellow; pointer-events: none; display: none; }
  </style>
</head>
<body>
  <button id="init-btn" disabled>環境安全檢測中...</button>
  <div id="container"></div>
  
  <div id="overlay">
    <div id="crosshair"><div class="line-v"></div><div class="line-h"></div><div class="center-circle"></div></div>
    <div id="status-text">SYSTEM STANDBY</div>
    <div id="debug-panel" id="debug-panel">CANVAS 偵測中...</div>
  </div>
  <div id="magician-zone"></div>

  <script>
    const initBtn = document.getElementById('init-btn');
    const statusText = document.getElementById('status-text');
    const debugPanel = document.getElementById('debug-panel');

    function showFatalError(msg) {
      statusText.style.display = 'block'; statusText.innerText = "【系統異常】: " + msg;
      statusText.style.background = "rgba(239, 68, 68, 0.8)"; statusText.style.color = "#fff";
    }

    const threeCdnList = [ "https://cdnjs.cloudflare.com/ajax/libs/three.js/r124/three.min.js" ];
    const mindArCdnList = [ "https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-three.prod.js" ];
    let threeIndex = 0, mindArIndex = 0;

    function loadThreeEngine() {
      initBtn.innerHTML = `引導 3D 核心...`;
      let script = document.createElement('script'); script.src = threeCdnList[threeIndex]; script.crossOrigin = "anonymous";
      script.onload = () => { if (window.THREE) loadMindArEngine(); };
      document.head.appendChild(script);
    }

    function loadMindArEngine() {
      initBtn.innerHTML = `對齊 AR 空間...`;
      let script = document.createElement('script'); script.src = mindArCdnList[mindArIndex]; script.crossOrigin = "anonymous";
      script.onload = () => {
        if (window.MINDAR && window.MINDAR.IMAGE && window.MINDAR.IMAGE.MindARThree) {
          initBtn.innerHTML = "啟動魔法連線"; initBtn.style.background = "#022c22"; initBtn.style.border = "2px solid #34d399";
          initBtn.style.color = "#34d399"; initBtn.disabled = false; initBtn.addEventListener('click', startAR);
        }
      };
      document.head.appendChild(script);
    }
    
    window.addEventListener('DOMContentLoaded', loadThreeEngine);

    const firebaseConfig = { databaseURL: "https://magic-ar-radar-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("magic_space_node");
    const urlParams = new URLSearchParams(window.location.search);
    const myRole = urlParams.get('role') || 'audience'; 

    let mindartThree, THREE, renderer, scene, camera, anchorGroup, targetMarker;
    let isTargetTracked = false;

    async function startAR() {
      initBtn.disabled = true; initBtn.innerText = "相機啟動中...";
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        initBtn.style.display = 'none'; 
        statusText.style.display = 'block'; document.getElementById('crosshair').style.display = 'block';
        debugPanel.style.display = 'block';
        statusText.innerText = "畫布強制置中建立中...";
        await new Promise(resolve => setTimeout(resolve, 100));
        stream.getTracks().forEach(t => t.stop());

        mindartThree = new window.MINDAR.IMAGE.MindARThree({ container: document.getElementById('container'), imageTargetSrc: 'targets.mind', maxTrack: 1 });
        THREE = window.THREE; renderer = mindartThree.renderer; scene = mindartThree.scene; camera = mindartThree.camera;
        
        // 🔥 全螢幕白光測試：在相機前放一塊半透明白板
        const fogMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
        const fogPlane = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), fogMat);
        fogPlane.position.set(0, 0, -2);
        camera.add(fogPlane);
        scene.add(camera);

        anchorGroup = mindartThree.addAnchor(0);

        // 巨大的藍色追蹤框
        const originMat = new THREE.MeshBasicMaterial({ color: 0x3b82f6, wireframe: true, wireframeLinewidth: 3 });
        const originMesh = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), originMat);
        anchorGroup.group.add(originMesh); 

        // 綠球
        targetMarker = new THREE.Mesh(new THREE.SphereGeometry(0.2, 32, 32), new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
        targetMarker.position.z = 0.5;
        targetMarker.visible = false; 
        anchorGroup.group.add(targetMarker);

        anchorGroup.onTargetFound = () => { isTargetTracked = true; if (myRole === 'magician') statusText.innerText = "【追蹤成功】點擊右下角發射"; };
        anchorGroup.onTargetLost = () => { isTargetTracked = false; if (myRole === 'magician') statusText.innerText = "請照到牌盒..."; };

        document.getElementById('magician-zone').addEventListener('click', (e) => {
          e.preventDefault(); e.stopPropagation();
          if (myRole !== 'magician' || !isTargetTracked) return;
          
          targetMarker.position.set(0, 0, 0.5); // 直接強制放在正中央上方
          targetMarker.visible = true; 
          statusText.innerText = `✅ 已強制放置綠球！`;
          db.set({ status: "locked", x: 0, y: 0, z: 0.5 }); 
          if(navigator.vibrate) navigator.vibrate(50);
        });

        await mindartThree.start();
        
        // 每秒更新一次 Canvas 狀態
        setInterval(() => {
          const cvs = document.querySelector('canvas');
          if(cvs) {
            const rect = cvs.getBoundingClientRect();
            debugPanel.innerHTML = `
              CANVAS W: ${rect.width.toFixed(0)} | H: ${rect.height.toFixed(0)}<br>
              TOP: ${rect.top.toFixed(0)} | LEFT: ${rect.left.toFixed(0)}<br>
              DISPLAY: ${getComputedStyle(cvs).display}<br>
              Z-INDEX: ${getComputedStyle(cvs).zIndex}
            `;
          } else {
            debugPanel.innerHTML = `❌ 沒有找到 Canvas 標籤!`;
          }
        }, 1000);

        renderer.setAnimationLoop(() => { renderer.render(scene, camera); });
      } catch (err) { showFatalError(err.message); }
    }
  </script>
</body>
</html>
