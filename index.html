<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR 空間雙機連線羅盤 V35.0 (終極演演出版)</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; user-select: none; -webkit-user-select: none; }
    #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; pointer-events: none; }
    
    /* 頂部狀態列：雙端完全相同 */
    #status-text { position: absolute; top: 40px; width: 90%; left: 5%; text-align: center; color: #34d399; font-size: 14px; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; border: 1px solid rgba(52, 211, 153, 0.5); font-weight: bold; pointer-events: auto; transition: all 0.3s; }
    
    /* 雷達掃描特效 */
    #radar-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 150vmax; height: 150vmax; border-radius: 50%; border: 2px solid rgba(52, 211, 153, 0.1); display: none; }
    #radar-sweep { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, rgba(52, 211, 153, 0) 0%, rgba(52, 211, 153, 0.05) 60%, rgba(52, 211, 153, 0.6) 100%); opacity: 0; transition: opacity 0.3s ease; animation: spin 1.5s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    /* 圓形 SCAN 按鈕 */
    #circle-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90px; height: 90px; border-radius: 50%; background: rgba(2, 44, 34, 0.85); border: 2px solid #34d399; color: #34d399; font-weight: bold; font-size: 14px; display: none; justify-content: center; align-items: center; cursor: pointer; pointer-events: auto; overflow: hidden; box-shadow: 0 0 15px rgba(52, 211, 153, 0.3); transition: transform 0.2s; }
    #circle-btn:active { transform: translate(-50%, -50%) scale(0.9); }

    /* 🤫 魔術師專用隱形錨定區：完全透明、無邊框、高層級 */
    #magician-zone { position: absolute; bottom: 0; right: 0; width: 130px; height: 130px; pointer-events: auto; background: transparent; z-index: 9999; }
  </style>
</head>
<body>

  <div id="ui-layer">
    <div id="status-text">偵測空間維度中...</div>
    
    <div id="radar-container"><div id="radar-sweep"></div></div>
    <div id="circle-btn">SCAN</div>
    
    <div id="magician-zone"></div>
  </div>

  <a-scene mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.1; filterBeta: 10" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    
    <a-entity mindar-image-target="targetIndex: 0" id="target-anchor">
      <a-plane id="hit-plane" position="0 0 0" scale="15 15 1" material="transparent: true; opacity: 0;"></a-plane>
      
      <a-entity id="target-marker" visible="false">
        <a-sphere position="0 0 0.5" radius="0.04" material="color: #00ff00;"></a-sphere>
        <a-cylinder position="0 0 0.25" radius="0.008" height="0.5" rotation="90 0 0" material="color: #00ff00; opacity: 0.8; transparent: true"></a-cylinder>
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    // --- 初始化 Firebase ---
    const firebaseConfig = { databaseURL: "https://magic-ar-radar-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("magic_space_node");
    
    // UI 與 AR 宣告
    const statusText = document.getElementById('status-text');
    const radarContainer = document.getElementById('radar-container');
    const radarSweep = document.getElementById('radar-sweep');
    const scanBtn = document.getElementById('circle-btn');
    const magicianZone = document.getElementById('magician-zone');
    
    const targetAnchor = document.getElementById('target-anchor');
    const targetMarker = document.getElementById('target-marker');
    const hitPlane = document.getElementById('hit-plane');
    const sceneEl = document.querySelector('a-scene');
    
    let isTargetTracked = false;
    let magicData = null; 
    let scanTimer = null; // 長按計時器

    // 同步雲端座標
    db.on('value', (snapshot) => {
      magicData = snapshot.val();
    });

    // --- AR 狀態監聽 ---
    targetAnchor.addEventListener("targetFound", event => {
      isTargetTracked = true;
      statusText.innerText = "已鎖定黑桃 Q！請長按 SCAN 進行深度掃描";
      statusText.style.color = "#34d399";
      scanBtn.style.display = 'flex'; 
    });
    
    targetAnchor.addEventListener("targetLost", event => {
      isTargetTracked = false;
      statusText.innerText = "請將相機對準黑桃 Q...";
      statusText.style.color = "#34d399";
      scanBtn.style.display = 'none';
      cancelScan();
      targetMarker.setAttribute('visible', 'false'); // 移開時暫時隱藏
    });

    // --- 🤫 魔術師：偷放點邏輯 (點擊右下角無痕區) ---
    magicianZone.addEventListener('click', (e) => {
      if (!isTargetTracked) return;
      
      const THREE = AFRAME.THREE;
      const raycaster = new THREE.Raycaster();
      // 使用螢幕正中央 (0,0) 作為發射點
      raycaster.setFromCamera(new THREE.Vector2(0, 0), sceneEl.camera);
      
      const hitMesh = hitPlane.getObject3D('mesh');
      const intersects = raycaster.intersectObject(hitMesh, true);
      
      if (intersects.length > 0) {
        const point = intersects[0].point;
        const localPos = targetAnchor.object3D.worldToLocal(point.clone());
        localPos.z = 0; // 鎖死在牌面上
        
        // 偷偷寫入資料庫，畫面上完全不漏痕跡
        db.set({ status: "locked", x: localPos.x, y: localPos.y, z: localPos.z });
        
        // 手機輕微震動提示魔術師「成功鎖定」，觀眾不會發現
        if(navigator.vibrate) navigator.vibrate(40);
      }
    });

    // --- 👁️ 雙端共用：SCAN 按鈕長按邏輯 ---
    function startScan(e) {
      if (e.cancelable) e.preventDefault();
      if (!isTargetTracked) return;

      // 啟動雷達視覺特效
      radarContainer.style.display = 'block';
      radarSweep.style.opacity = '1';
      statusText.innerText = "⚡ 正在解構黑桃 Q 空間能量...請勿放開";
      statusText.style.color = "#facc15";

      // 設定長按 2 秒 (2000毫秒) 觸發成功
      scanTimer = setTimeout(() => {
        executeScanSuccess();
      }, 2000);
    }

    function cancelScan() {
      if (scanTimer) {
        clearTimeout(scanTimer);
        scanTimer = null;
        radarSweep.style.opacity = '0';
        radarContainer.style.display = 'none';
        if (isTargetTracked) {
          statusText.innerText = "❌ 掃描中斷！請長按按鈕不要放開";
          statusText.style.color = "#ef4444";
        }
      }
    }

    function executeScanSuccess() {
      scanTimer = null;
      radarSweep.style.opacity = '0';
      radarContainer.style.display = 'none';
      scanBtn.style.display = 'none'; // 掃描成功後隱藏按鈕

      if (magicData && magicData.status === "locked") {
        // 成功顯現綠色圖釘
        targetMarker.setAttribute('position', `${magicData.x} ${magicData.y} ${magicData.z}`);
        targetMarker.setAttribute('visible', 'true');
        statusText.innerText = "🎯 發現殘留精神標記！座標已成功顯現！";
        statusText.style.color = "#00ff00";
        if(navigator.vibrate) navigator.vibrate([80, 50, 80]);
      } else {
        // 雲端還沒有資料
        statusText.innerText = "掃描完成。該空間純淨，未發現任何標記。";
        statusText.style.color = "#9ca3af";
        setTimeout(() => { if(isTargetTracked) scanBtn.style.display = 'flex'; }, 2000);
      }
    }

    // 綁定長按事件（相容手機觸控與電腦滑鼠）
    scanBtn.addEventListener('touchstart', startScan, { passive: false });
    scanBtn.addEventListener('touchend', cancelScan);
    scanBtn.addEventListener('touchcancel', cancelScan);

    scanBtn.addEventListener('mousedown', startScan);
    scanBtn.addEventListener('mouseup', cancelScan);
    scanBtn.addEventListener('mouseleave', cancelScan);
  </script>
</body>
</html>
